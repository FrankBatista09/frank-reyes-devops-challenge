apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devsu-demo

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - networkpolicy.yaml

labels:
  - includeSelectors: false
    pairs:
      app.kubernetes.io/name: devsu-demo
      app.kubernetes.io/part-of: devsu-demo
      app.kubernetes.io/managed-by: kustomize

images:
  - name: devsu-demo-devops-nodejs
    newTag: latest

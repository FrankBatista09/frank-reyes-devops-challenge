# Local convenience: build and run the production image exactly as it will run
# in the cluster (non-root, healthcheck, writable data volume).
#   docker compose up --build
services:
  app:
    build:
      context: .
      target: runtime
    image: devsu-demo-devops-nodejs:local
    container_name: devsu-demo-app
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      PORT: "8000"
      DATABASE_STORAGE: /data/dev.sqlite
      DATABASE_USER: user
      DATABASE_PASSWORD: password
    volumes:
      - app-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app-data:

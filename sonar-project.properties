# SonarCloud / SonarQube configuration (used by the optional code-quality job).
# Set SONAR_TOKEN as a repo secret to enable it; update the keys below to match
# your SonarCloud organization/project.
sonar.projectKey=FrankBatista09_frank-reyes-devops-challenge
sonar.organization=frankbatista09

sonar.sources=index.js,users,shared
sonar.tests=index.test.js
sonar.exclusions=node_modules/**,coverage/**,k8s/**,terraform/**

# Reuse the LCOV report produced by `npm run test:coverage`.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
